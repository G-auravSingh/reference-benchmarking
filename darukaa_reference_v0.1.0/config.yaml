# ==============================================================================
# Darukaa Reference Benchmarking Pipeline — Configuration
# ==============================================================================

gee:
  project: "your-gee-project-id"         # Google Earth Engine project ID
  service_account: null                    # Optional: for server-side auth
  key_path: null                           # Optional: path to SA key JSON

# Paths to locally-stored raster datasets
# Download these before running the pipeline:
#   GLOBIO4 MSA: https://dataportaal.pbl.nl/downloads/GLOBIO/
#   SEED Index:  https://zenodo.org/records/13799961
rasters:
  globio4_msa: "./data/globio4_msa_2015.tif"
  seed_biocomplexity: "./data/seed_biocomplexity_beta.tif"
  # Add more local rasters here as needed

# Tier 2 reference selection parameters
# Methodology: McElderry et al. (2024) DOI:10.32942/X2689N
#              McNellie et al. (2020) DOI:10.1111/gcb.15383
tier2:
  buffer_km: 100                           # Search radius for reference patches
  hmi_percentile: 5                        # Top N% least-disturbed pixels
  min_pixels: 20                           # Minimum reference pixels for validity

# Remote sensing parameters
ndvi_year: 2024
ndvi_cloud_threshold: 20                   # Max cloud cover % for Sentinel-2
lst_year: 2024

# Statistical comparison parameters
# References: Cohen (1988), Hedges (1981), Davison & Hinkley (1998)
statistics:
  bootstrap_n: 10000
  permutation_n: 10000
  confidence: 0.95
  seed: 42

# Output settings
output:
  dir: "./output"
  format: "both"                           # "json", "csv", or "both"

# Optional: restrict to specific indicators (empty = run all)
# indicators:
#   - ndvi
#   - bii
#   - ghm
